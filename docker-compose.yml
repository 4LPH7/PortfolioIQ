version: "3.9"

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: portfolioiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolioiq
      POSTGRES_USER: portfolioiq_user
      POSTGRES_PASSWORD: portfolioiq_pass_change_me
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro  # Auto-runs migrations on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolioiq_user -d portfolioiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # pgAdmin (Optional — Database GUI)
  # Access at http://localhost:5050
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: portfolioiq_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@portfolioiq.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin_change_me
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - tools  # Only starts with: docker compose --profile tools up

volumes:
  pgdata:
    driver: local
  pgadmin_data:
    driver: local
